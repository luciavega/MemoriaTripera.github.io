    <style>
        /* Tooltip */
        .tooltip {
            font-weight: bold;
            color: #0F4170;
            position: relative;
            cursor: pointer;
        }

        .tooltiptext {
            visibility: hidden;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 4px;
            padding: 5px;
            position: absolute;
            z-index: 10;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s;
            width: max-content;
            max-width: 250px;
        }

        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }

        /* BIO */
        .bio-header {
            margin: 2rem auto 0;
            max-width: 90vw;
            text-align: center;
        }

        .bio-top {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
        }

        .bio-img {
            max-width: 300px;
            width: 100%;
            height: auto;
        }

        .bio-info {
            text-align: left;
            font-size: 1.2rem;
        }

        #bio-id {
            font-family: 'Vanguard CF SemiBold', sans-serif;
            font-size: 2.8rem;
            color: #0F4170;
        }

        #bio-subtitulo {
            margin-top: 0.3rem;
            font-style: italic;
        }

        #bio-texto {
            margin-top: 2rem;
            white-space: pre-wrap;
            text-align: justify;
            width: 100%;
            font-family: 'Public Sans', sans-serif;
            font-size: 1.1rem;
        }

        .bio-video-embed {
            width: 55%;
            max-width: 760px;
            aspect-ratio: 4 / 3;
            margin: 30px auto 10px;
            display: block;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        /* Responsive: título/subtítulo debajo de la imagen en móvil */
        @media (max-width: 768px) {
            .bio-top {
                flex-direction: column;
                align-items: center;
            }
            .bio-info {
                text-align: center;
            }
        }
    </style>

  .then(r => r.json())
  .then(personas => {

    if (!p) {
      document.getElementById('detalle-container').innerHTML = '<p>Biografía no encontrada.</p>';
      return;
    }

        const video = videosPorId[p.id];
        const videoHtml = video && video.src
            ? `<section class="playlist-section">
                    <iframe class="bio-video-embed" width="942" height="530" src="${video.src}" title="${video.title || p.nombre}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                </section>`
            : '';
    
    document.getElementById('detalle-container').innerHTML = `
      <div class="bio-header">
        <div class="bio-top">
          <img src="${p.foto}" alt="${p.nombre}" class="bio-img">
          <div class="bio-info">
            <div id="bio-id"><strong>${p.nombre}</strong></div>
            <div id="bio-subtitulo">${p.subtitulo || ''}</div>
          </div>
        </div>
        <div id="bio-texto">${p.texto}</div>

      </div>
    `;
