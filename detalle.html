    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400&display=swap" rel="stylesheet">
    <style>
        /* Tooltip */
        .tooltip {
            font-weight: bold;
            color: #0F4170;
            position: relative;
            cursor: pointer;
        }

        .tooltiptext {
            visibility: hidden;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 4px;
            padding: 5px;
            position: absolute;
            z-index: 10;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s;
            width: max-content;
            max-width: 250px;
        }

        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }

        /* BIO */
        .bio-header {
            margin: 2rem auto 0;
            max-width: 90vw;
            text-align: center;
        }

        .bio-top {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
        }

        .bio-img {
            max-width: 300px;
            width: 100%;
            height: auto;
        }

        .bio-info {
            text-align: left;
            font-size: 1.2rem;
        }

        #bio-id {
            font-family: 'Vanguard CF SemiBold', sans-serif;
            font-size: 2.8rem;
            color: #0F4170;
        }

        #bio-subtitulo {
            margin-top: 0.3rem;
            font-style: italic;
        }

        #bio-texto {
            margin-top: 2rem;
            white-space: pre-wrap;
            text-align: justify;
            width: 100%;
            font-family: 'Public Sans', sans-serif;
            font-size: 1.1rem;
        }

        /* Responsive: título/subtítulo debajo de la imagen en móvil */
        @media (max-width: 768px) {
            .bio-top {
                flex-direction: column;
                align-items: center;
            }
            .bio-info {
                text-align: center;
            }
        }
    </style>
</head>
<body>
<header class="encabezado">

        <div class="logo">
            <img src="recursos/logo2.png" alt="Logo">
        </div>
        <nav class="navbar">
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="biografias.html">Biografías</a></li>
                <li><a href="notas.html">Malvinas</a></li>
                <li><a href="nosotros.html">¿Quiénes somos?</a></li>
            </ul>
        </nav>
    </div>
</header>

<div class="imagen-rasgada">
    <img src="recursos/Header.png" alt="Efecto rasgado">
</div>

<main id="detalle-container">
</main>

<script>
const params = new URLSearchParams(location.search);
const id = params.get('id');

fetch('biografias.json')
  .then(r => r.json())
  .then(personas => {
    const p = personas.find(x => x.id === id);
    if (!p) {
      document.getElementById('detalle-container').innerHTML = '<p>Biografía no encontrada.</p>';
      return;
    }
    
    document.getElementById('detalle-container').innerHTML = `
      <div class="bio-header">
        <div class="bio-top">
          <img src="${p.foto}" alt="${p.nombre}" class="bio-img">
          <div class="bio-info">
            <div id="bio-id"><strong>${p.nombre}</strong></div>
            <div id="bio-subtitulo">${p.subtitulo || ''}</div>
          </div>
        </div>
        <div id="bio-texto">${p.texto}</div>
      </div>
    `;

    aplicarGlosario();
  })
  .catch(err => console.error(err));
</script>
