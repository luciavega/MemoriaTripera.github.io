    <title>Biografias</title>
    <link rel="stylesheet" href="styles.css" />

<body>

<header class="encabezado">
    <div class="contenido-header">
        <div class="logo">
            <img src="recursos/logo2.png" alt="Logo">
        </div>
        <nav class="navbar">
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="biografias.html">Biografías</a></li>
                <li><a href="notas.html">Malvinas</a></li>
                <li><a href="nosotros.html">¿Quiénes somos?</a></li>
            </ul>
        </nav>
    </div>
</header>

<div class="imagen-rasgada">
    <img src="recursos/Header.png" alt="Efecto rasgado">
</div>

<main>

    <section class="contenido">
        <h2 class="titulo-introbio">
            Llevamos reconstruidas 63 biografías
        </h2>

        <div class="contenedor-principal">

            <aside class="sidebar">

                <h3>Filtrar</h3>

                <!-- buscador -->
                <div class="bloque-filtro">
                    <label for="buscador">Buscar por nombre</label>
                    <input type="text" id="buscador" placeholder="Ej: Carlos Pérez">
                </div>

                <!-- Nacimiento -->
                <div class="bloque-filtro">
                    <label for="filtro-nacimiento">Nacimiento</label>
                    <select id="filtro-nacimiento">
                        <option value="">-- Todos --</option>
                    </select>
                </div>

                <!-- Primarios -->
                <div class="bloque-filtro">
                    <label for="filtro-primarios">Primarios</label>
                    <select id="filtro-primarios">
                        <option value="">-- Todos --</option>
                    </select>
                </div>

                <!-- Secundarios -->
                <div class="bloque-filtro">
                    <label for="filtro-secundarios">Secundarios</label>
                    <select id="filtro-secundarios">
                        <option value="">-- Todos --</option>
                    </select>
                </div>

                <!-- Estudios Superiores -->
                <div class="bloque-filtro">
                    <label for="filtro-superiores">Estudios Superiores</label>
                    <select id="filtro-superiores">
                        <option value="">-- Todos --</option>
                    </select>
                </div>

                <!-- Militancia -->
                <div class="bloque-filtro">
                    <label for="filtro-militancia">Militancia</label>
                    <select id="filtro-militancia">
                        <option value="">-- Todos --</option>
                    </select>
                </div>

                <!-- Deporte -->
                <div class="bloque-filtro">
                    <label for="filtro-deporte">Deporte</label>
                    <select id="filtro-deporte">
                        <option value="">-- Todos --</option>
                    </select>
                </div>

                <!-- Instituciones -->
                <div class="bloque-filtro">
                    <label for="filtro-instituciones">Instituciones</label>
                    <select id="filtro-instituciones">
                        <option value="">-- Todos --</option>
                    </select>
                </div>

                <!-- Centros Clandestinos de Detención -->
                <div class="bloque-filtro">
                    <label for="filtro-ccdd">Centros Clandestinos de Detención</label>
                    <select id="filtro-ccdd">
                        <option value="">-- Todos --</option>
                    </select>
                </div>

                <!-- Asesinato/Secuestro -->
                <div class="bloque-filtro">
                    <label for="filtro-victima">ASESINATO/SECUESTRO</label>
                    <select id="filtro-victima">
                        <option value="">-- Todos --</option>
                    </select>
                </div>

                <button class="btn-reset">Resetear filtros</button>

            </aside>

            <template id="card-template">
                <div class="card">
                    <div class="card-click">
                        <img src="" alt="">
                        <h3 style="font-size:1.4rem;"> </h3>
                    </div>
                </div>
            </template>
            <section class="grid-biografias" id="grid">
            </section>
        </div> <!-- cierre contenedor-principal -->
    </section> <!-- cierre contenido -->
</main>
